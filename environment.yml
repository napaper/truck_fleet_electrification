name: dt_cargo_electrification
channels:
  - anaconda
  - defaults
  - conda-forge
dependencies:
  - python=3.8.12
  - pandas=2.0.3  # If it breaks, try 1.5.3; upgraded from 1.3.5 to fix SQLAlchemy error
  - seaborn  # Breaks for 0.11.2 (data_visualisation line 91: OptionError)
  - matplotlib=3.7.2
  - pip
  - plotly
  - shapely
  - sqlalchemy
  - contextily
  - geopandas
  - fpdf
  - svgpathtools
  - svgpath2mpl
  - psycopg2  # Optional: Remove if using psycopg2-binary via pip
  - pip:
      - ipykernel
      - ipywidgets
      - scienceplots
      - psycopg2-binary
      # fclist is out of date and commented out
      # latex is commented out